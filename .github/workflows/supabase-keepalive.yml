name: Supabase Keepalive

on:
  schedule:
    # Run every 6 hours to ensure activity is registered even if some runs fail
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    # Add timeout to prevent stuck workflows
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Update keepalive timestamp in Supabase
        id: keepalive
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run supabase:keepalive
        # Retry logic is built into the script

      - name: Verify keepalive was successful
        if: success()
        run: echo "✅ Keepalive completed successfully at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: Report failure
        if: failure()
        run: |
          echo "❌ Keepalive failed!"
          exit 1
